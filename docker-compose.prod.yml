services:
  db:
    image: postgres:15-alpine
    container_name: kanban-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
      POSTGRES_USER: ${POSTGRES_USER:-kanban_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban_pass}
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: kanban-backend
    restart: always
    command: sh -c "uv run python manage.py collectstatic --noinput && uv run python manage.py migrate && uv run daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/staticfiles:/app/staticfiles
    env_file:
      - .env.prod
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-kanban}
      - POSTGRES_USER=${POSTGRES_USER:-kanban_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kanban_pass}
    depends_on:
      - db

volumes:
  db_data:
